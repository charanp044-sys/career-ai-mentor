<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Helping Hand</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-purple-100 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">

    <h1 class="text-3xl font-bold text-center text-blue-700">
        Helping Hand
    </h1>

    <p class="text-center text-gray-500 mb-6">
        AI Career Mentor Login
    </p>

    <form id="loginForm">

        <!-- Email -->

        <label class="font-semibold">
            Email
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            class="w-full border p-3 rounded-lg mt-2 mb-1">

        <p id="emailCount" class="text-sm text-gray-500 mb-4">
            Characters: 0
        </p>

        <!-- Password -->

        <label class="font-semibold">
            Password
        </label>

        <input
            type="password"
            id="password"
            placeholder="Enter your password"
            class="w-full border p-3 rounded-lg mt-2 mb-6">

        <!-- Login Button -->

        <button
            id="loginBtn"
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">

            Login

        </button>

    </form>

</div>

<script>

// Load Event
window.addEventListener("load", () => {

    alert("Welcome to Helping Hand AI Career Mentor");

});

const email = document.getElementById("email");
const password = document.getElementById("password");
const emailCount = document.getElementById("emailCount");
const loginBtn = document.getElementById("loginBtn");

// Input Event
email.addEventListener("input", () => {

    emailCount.innerText =
    "Characters: " + email.value.length;

});

// Focus Event
email.addEventListener("focus", () => {

    email.classList.add("border-4","border-blue-500");

});

// Blur Event
email.addEventListener("blur", () => {

    email.classList.remove("border-4","border-blue-500");

});

// Mouseover Event
loginBtn.addEventListener("mouseover", () => {

    loginBtn.classList.add("scale-105");

});

// Mouseout Event
loginBtn.addEventListener("mouseout", () => {

    loginBtn.classList.remove("scale-105");

});

// Submit Event
document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    if(email.value.trim()==="" || password.value.trim()===""){

        alert("Please fill all fields.");
        return;

    }

    localStorage.setItem("userEmail", email.value);

    alert("Login Successful!");

    window.location.href = "assessment.html";

});

</script>

</body>
</html>
